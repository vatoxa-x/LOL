name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Tools
        run: |
          pip install buildozer cython flet
          sudo apt-get install -y scons libncurses5-dev libncursesw5-dev zlib1g-dev cmake build-essential libsqlite3-dev libffi-dev libssl-dev


      - name: Build APK
        run: |
          buildozer init
          # Настройка конфига
          sed -i 's/requirements = python3,kivy/requirements = python3,flet,flet_audio,pyjnius/' buildozer.spec
          sed -i 's/#android.permissions = INTERNET/android.permissions = INTERNET,MODIFY_AUDIO_SETTINGS/' buildozer.spec
          sed -i 's/source.include_exts = py,png,jpg,kv,atlas/source.include_exts = py,png,jpg,kv,atlas,mp3/' buildozer.spec
          # Запуск сборки
          buildozer -v android debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-bundle
          path: bin/*.apk
